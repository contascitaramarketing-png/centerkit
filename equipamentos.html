<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipamentos — CenterKit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div id="ck-header"></div>
  <section class="page-header">
    <div class="container">
      <nav class="breadcrumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Equipamentos</span></nav>
      <h1>Equipamentos para diagnóstico</h1>
      <p>Soluções completas para bioquímica, hematologia, coagulação, urinálise, HPLC, point of care e muito mais — com instalação, treinamento e assistência técnica especializada.</p>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div class="cat-grid" id="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))"></div>
    </div>
  </section>
  <div id="ck-footer"></div>
  <script src="assets/icons.js"></script><script src="assets/data.js"></script><script src="assets/layout.js"></script>
  <script>
    CK.render({ active: "equipamentos" });
    const I = CK.I, D = CK.D;
    document.getElementById("grid").innerHTML = D.equipmentCategories.map(c => `
      <a href="categoria.html?id=${c.id}&nome=${encodeURIComponent(c.name)}" class="cat-card" style="padding:32px 20px">
        <span class="ic" style="width:64px;height:64px">${I(c.icon)}</span>
        <span class="name" style="font-size:14px">${c.short}</span>
        <span class="count">Ver linha</span>
      </a>`).join("");
  </script>
<script src="assets/tweaks.js"></script>
</body>
</html>
